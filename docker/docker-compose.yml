services:
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: court-hearing-scheduler:latest
    container_name: court-hearing-scheduler
    ports:
      - "8000:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - DJANGO_DEBUG=false
      - DJANGO_SECRET_KEY=temporary-docker-key
      - DJANGO_ALLOWED_HOSTS=localhost,127.0.0.1
      - DJANGO_DB_PATH=/data/db.sqlite3
      - GUNICORN_WORKERS=3
      - GUNICORN_TIMEOUT=60
    volumes:
      - db-data:/data # Store the database in a different volume so it persists across rebuilds
    restart: unless-stopped

volumes:
  db-data:
