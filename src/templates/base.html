{% load static %}
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Court Hearing Scheduler{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css">
    <link rel="stylesheet" href="{% static 'hearing_list_page.css' %}">
    <style>
        html, body { height: 100%; }
        body { margin: 0; display: flex; flex-direction: column; }
        main { flex: 1; min-height: 0; padding: 1.5rem; display: flex; flex-direction: column; }
        .navbar { display: flex; align-items: center; gap: 1.5rem; padding: 0.75rem 1.5rem; background: #1f2937; color: #fff; }
        .navbar a { color: #fff; text-decoration: none; font-weight: 500; }
        .navbar a:hover { text-decoration: underline; }
        .navbar .brand { font-weight: 700; font-size: 1.1rem; margin-right: auto; }
    </style>
</head>
<body>
    {% include "partials/navbar.html" %}
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        lucide.createIcons();
        document.body.addEventListener('htmx:afterSwap', () => lucide.createIcons());
    </script>
</body>
</html>
